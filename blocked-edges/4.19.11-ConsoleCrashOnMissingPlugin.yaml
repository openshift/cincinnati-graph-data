to: 4.19.11
from: ^4[.](18[.].*|19[.][0-6])[+].*$
url: https://issues.redhat.com/browse/CONSOLE-4762
name: ConsoleCrashOnMissingPlugin
message: If a Console Operator configuration resource references a plugin name for which there is no corresponding ConsolePlugin resource, the Console may crashloop after the cluster is updated to an affected version.
matchingRules:
- type: PromQL
  promql:
    promql: |
      topk(1,
        group by (name, state) (cluster:console_plugins_info:max{state="notfound"})
        or
        0 * group by (name, state) (cluster:console_plugins_info:max{state!="notfound"})
      )
